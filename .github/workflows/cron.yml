name: Scheduled Post Publisher

on:
  schedule:
    # 하루 7회 발행 - 조회수 최적화 골든 타임 (KST 기준, UTC-9)
    - cron: '0 22 * * *'  # KST 07:00 기상 직후
    - cron: '0 0 * * *'   # KST 09:00 출근길
    - cron: '0 3 * * *'   # KST 12:00 점심시간
    - cron: '0 5 * * *'   # KST 14:00 오후 피크
    - cron: '0 9 * * *'   # KST 18:00 퇴근길
    - cron: '0 11 * * *'  # KST 20:00 저녁 메인 피크
    - cron: '0 13 * * *'  # KST 22:00 취침 전 감성
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Test Database Connection
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node scripts/test-connection.js

      - name: Run Standalone Publisher
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        run: node scripts/publish-standalone.js
