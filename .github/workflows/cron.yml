name: Scheduled Post Publisher

on:
  schedule:
    # 하루 10회 발행 - 2030 타겟 핵심 시간대 (KST 기준, UTC-9)
    - cron: '0 0 * * *'   # KST 09:00 출근길
    - cron: '0 2 * * *'   # KST 11:00 오전 브레이크
    - cron: '0 3 * * *'   # KST 12:00 점심
    - cron: '0 5 * * *'   # KST 14:00 오후 집중 떨어질 때
    - cron: '0 7 * * *'   # KST 16:00 퇴근 준비
    - cron: '0 9 * * *'   # KST 18:00 퇴근길
    - cron: '0 11 * * *'  # KST 20:00 저녁 핵심 피크
    - cron: '0 12 * * *'  # KST 21:00 저녁 핵심 피크 2
    - cron: '0 14 * * *'  # KST 23:00 새벽 감성
    - cron: '0 16 * * *'  # KST 01:00 불면증 타임
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Standalone Publisher
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        run: node scripts/publish-standalone.js
